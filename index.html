<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloomdoro — Gamified Focus Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop" id="settings-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2>⚙️ Settings</h2>
        <button class="btn-icon" id="close-settings">✕</button>
      </div>
      <div class="modal-body">
        <div class="settings-group">
          <h3>Timer Durations</h3>
          <div class="setting-row">
            <label>Focus <span class="hint">(minutes)</span></label>
            <input type="number" id="s-focus" min="1" max="90" value="25" />
          </div>
          <div class="setting-row">
            <label>Short Break</label>
            <input type="number" id="s-short" min="1" max="30" value="5" />
          </div>
          <div class="setting-row">
            <label>Long Break</label>
            <input type="number" id="s-long" min="5" max="60" value="15" />
          </div>
          <div class="setting-row">
            <label>Sessions before long break</label>
            <input type="number" id="s-sessions" min="1" max="10" value="4" />
          </div>
        </div>
        <div class="settings-group">
          <h3>🎯 Daily Goal</h3>
          <div class="setting-row">
            <label>Target focus minutes / day</label>
            <input type="number" id="s-goal" min="5" max="480" value="50" />
          </div>
        </div>
        <div class="settings-group">
          <h3>Automation</h3>
          <div class="setting-row">
            <label>Auto-start breaks</label>
            <label class="toggle"><input type="checkbox" id="s-auto-break" /><span class="slider"></span></label>
          </div>
          <div class="setting-row">
            <label>Auto-start focus</label>
            <label class="toggle"><input type="checkbox" id="s-auto-focus" /><span class="slider"></span></label>
          </div>
          <div class="setting-row">
            <label>Sound alerts</label>
            <label class="toggle"><input type="checkbox" id="s-sound" checked /><span class="slider"></span></label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="save-settings">Save Settings</button>
      </div>
    </div>
  </div>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🌸</span>
        <span class="logo-text">Bloomdoro</span>
      </div>
      <nav class="header-nav">
        <button class="btn-icon nav-btn" id="open-settings" title="Settings">⚙️</button>
      </nav>
    </header>

    <!-- Theme Selector -->
    <section class="theme-selector">
      <h2 class="section-title">What will you grow today?</h2>
      <div class="theme-cards">
        <button class="theme-card active" data-theme="flower"><div class="theme-preview flower-preview"></div><span>Flower</span></button>
        <button class="theme-card" data-theme="tree"><div class="theme-preview tree-preview"></div><span>Forest</span></button>
        <button class="theme-card" data-theme="cactus"><div class="theme-preview cactus-preview"></div><span>Cactus</span></button>
        <button class="theme-card" data-theme="cat"><div class="theme-preview cat-preview"></div><span>Cat</span></button>
        <button class="theme-card" data-theme="fox"><div class="theme-preview fox-preview"></div><span>Fox</span></button>
        <button class="theme-card" data-theme="crystal"><div class="theme-preview crystal-preview"></div><span>Crystal</span></button>
      </div>
    </section>

    <!-- Main -->
    <main class="main-content">
      <div class="garden-stage" id="garden-stage">
        <div class="garden-sky"></div>
        <div class="garden-ground"></div>
        <div class="garden-entity" id="garden-entity"></div>
        <div class="growth-label" id="growth-label">Seed 🌱</div>
        <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
      </div>

      <div class="timer-section">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="focus">Focus</button>
          <button class="mode-tab" data-mode="short">Short Break</button>
          <button class="mode-tab" data-mode="long">Long Break</button>
        </div>
        <div class="clock-wrap">
          <svg class="clock-ring" viewBox="0 0 220 220">
            <circle class="ring-track" cx="110" cy="110" r="96" />
            <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="96"
              stroke-dasharray="603" stroke-dashoffset="0" />
          </svg>
          <div class="clock-face">
            <div class="clock-time" id="clock-display">25:00</div>
            <div class="clock-mode-label" id="clock-mode-label">Focus Time</div>
          </div>
        </div>
        <div class="timer-controls">
          <button class="btn-icon ctrl-btn" id="btn-reset" title="Reset">↺</button>
          <button class="btn-primary start-btn" id="btn-start">Start</button>
          <button class="btn-icon ctrl-btn" id="btn-skip" title="Skip">⏭</button>
        </div>
        <div class="session-dots" id="session-dots"></div>
      </div>
    </main>

    <!-- Daily Goal Bar -->
    <section class="goal-section">
      <div class="goal-header">
        <span class="goal-label">🎯 Today's Goal</span>
        <span class="goal-progress-text" id="goal-progress-text">0 / 50 min</span>
      </div>
      <div class="goal-bar-wrap">
        <div class="goal-bar" id="goal-bar" style="width:0%"></div>
      </div>
    </section>

    <!-- Weekly Streak -->
    <section class="streak-section">
      <div class="streak-title">
        <span>🔥 Weekly Streak</span>
        <span class="streak-count" id="streak-count">0 day streak</span>
      </div>
      <div class="weekday-row" id="weekday-row">
        <!-- JS fills in Mon–Sun chips -->
      </div>
    </section>

    <!-- Stats Bar -->
    <footer class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="stat-sessions">0</span>
        <span class="stat-label">Sessions</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-minutes">0</span>
        <span class="stat-label">Total Minutes</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-streak">0</span>
        <span class="stat-label">Day Streak 🔥</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-level">Seedling</span>
        <span class="stat-label">Garden Level</span>
      </div>
    </footer>
  </div>

  <div id="toast-container"></div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
